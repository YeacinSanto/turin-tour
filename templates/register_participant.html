{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border shadow-sm p-4 bg-white rounded">
            <h3 class="fw-bold mb-1 text-center">Tourist Registration</h3>
            <p class="text-muted text-center small mb-4">Create a free profile to start booking tours instantly.</p>
            
            <form method="POST" action="{{ url_for('auth_route.register_participant') }}">
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label small">First Name</label>
                        <input type="text" name="first_name" required class="form-control">
                    </div>
                    <div class="col-6">
                        <label class="form-label small">Last Name</label>
                        <input type="text" name="last_name" required class="form-control">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small">Email Address</label>
                    <input type="email" name="email" required class="form-control">
                </div>
                <div class="mb-4">
                    <label class="form-label small">Password</label>
                    <input type="password" name="password" required class="form-control" placeholder="At least 8 characters">
                </div>
                <button type="submit" class="btn btn-dark w-100 fw-semibold py-2">Create Account</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
