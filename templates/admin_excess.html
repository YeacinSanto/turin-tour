{% extends 'base.html' %}
{% block content %}
<div class="p-4 mb-4 bg-white rounded shadow-sm border-start border-primary border-4">
    <h2 class="fw-bold text-dark">Audit & Edit: {{ tour.title }}</h2>
</div>

<form method="POST" class="bg-white p-4 shadow-sm rounded">
    <div class="mb-3">
        <label class="form-label fw-bold">Title</label>
        <input type="text" name="title" class="form-control" value="{{ tour.title }}" required>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Meeting Point</label>
            <input type="text" name="meeting_point" class="form-control" value="{{ tour.meeting_point }}" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Duration (Minutes)</label>
            <input type="number" name="duration" class="form-control" value="{{ tour.duration }}" required>
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label fw-bold">Description</label>
        <textarea name="description" class="form-control" rows="4" required>{{ tour.description }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary fw-bold px-4">Commit Changes</button>
    <a href="{{ url_for('admin_route.dashboard') }}" class="btn btn-link text-muted">Cancel</a>
</form>
{% endblock %}
