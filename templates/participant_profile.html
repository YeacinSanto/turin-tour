{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border shadow-sm p-4 bg-white rounded">
            <h3 class="fw-bold mb-1">Profile Settings</h3>
            <p class="text-muted small mb-4">Keep your contact details and safety preferences up to date.</p>

            <form method="POST" action="{{ url_for('participants_route.profile') }}">
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label small">First Name</label>
                        <input type="text" name="first_name" class="form-control" value="{{ current_user.first_name }}">
                    </div>
                    <div class="col-6">
                        <label class="form-label small">Last Name</label>
                        <input type="text" name="last_name" class="form-control" value="{{ current_user.last_name }}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small text-muted">Email Address</label>
                    <input type="email" class="form-control bg-light" value="{{ current_user.email }}" readonly disabled>
                </div>

                <hr class="my-4">
                <h5 class="fw-bold text-dark mb-3">Security</h5>
                <div class="mb-4">
                    <label class="form-label small">Change Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Leave blank to keep current">
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="{{ url_for('participants_route.dashboard') }}" class="btn btn-outline-secondary px-3">Cancel</a>
                    <button type="submit" class="btn btn-dark px-4">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
