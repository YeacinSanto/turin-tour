{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card border shadow-sm p-4 bg-white rounded">
            <h3 class="fw-bold text-center mb-4">Account Login</h3>
            
            <form method="POST" action="{{ url_for('auth_route.login') }}">
                <div class="mb-3">
                    <label class="form-label small text-secondary">Email Address</label>
                    <input type="email" name="email" required class="form-control" placeholder="name@example.com">
                </div>
                <div class="mb-4">
                    <label class="form-label small text-secondary">Password</label>
                    <input type="password" name="password" required class="form-control" placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-dark w-100 fw-semibold py-2">Sign In</button>
            </form>
            
            <div class="text-center mt-4 pt-3 border-top small">
                <span class="text-muted d-block mb-2">Don't have an account?</span>
                <a href="{{ url_for('auth_route.register_participant') }}" class="text-dark fw-semibold me-3 text-decoration-none">Register as Tourist</a>
                <a href="{{ url_for('auth_route.register_guide') }}" class="text-dark fw-semibold text-decoration-none">Become a Guide</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
