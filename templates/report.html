{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border shadow-sm p-4 bg-white rounded">
            <h3 class="fw-bold text-danger mb-1">Post-Tour Audit Report</h3>
            <p class="text-muted small mb-4">Declare metrics verified on site for <strong>{{ tour.title }}</strong> executed on <strong>{{ date_str }}</strong>.</p>
            
            <form method="POST" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Actual Attendance Present</label>
                    <input type="number" name="actual_count" required min="0" class="form-control" placeholder="Count specific physical attendees verified">
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-semibold">Attendance Confirmation Snapshot File</label>
                    <p class="text-muted small text-xs mb-2">Provide verification media elements highlighting group size profiles matching data bounds.</p>
                    <input type="file" name="report_photo" required class="form-control">
                </div>

                <div class="d-flex gap-2 justify-content-end border-top pt-3">
                    <a href="{{ url_for('guides_route.dashboard') }}" class="btn btn-outline-secondary btn-sm px-3">Discard</a>
                    <button type="submit" class="btn btn-danger btn-sm px-4 fw-semibold shadow-sm">Commit Report</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
