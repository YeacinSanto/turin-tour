{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border shadow-sm p-4 bg-white rounded">
            <h3 class="fw-bold mb-1 text-center">Become a Guide</h3>
            <p class="text-muted text-center small mb-4">Register your credentials to manage and host tours in Turin.</p>
            
            <form method="POST" action="{{ url_for('auth_route.register_guide') }}">
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label small">First Name</label>
                        <input type="text" name="first_name" required class="form-control">
                    </div>
                    <div class="col-6">
                        <label class="form-label small">Last Name</label>
                        <input type="text" name="last_name" required class="form-control">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label small">Professional Email</label>
                    <input type="email" name="email" required class="form-control">
                </div>
                <div class="mb-4">
                    <label class="form-label small">Password</label>
                    <input type="password" name="password" required class="form-control" placeholder="At least 8 characters">
                </div>
                
                <!-- Spoken Languages Box -->
                <div class="mb-4 p-3 bg-light rounded border">
                    <label class="form-label d-block fw-semibold text-dark small mb-2">Spoken Languages</label>
                    <div class="row g-2">
                        {% for lang in ['Italian', 'English', 'Spanish', 'Portuguese', 'German'] %}
                            <div class="col-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="languages" value="{{ lang }}" id="lang_{{ lang }}">
                                    <label class="form-check-label small text-secondary" for="lang_{{ lang }}">{{ lang }}</label>
                                </div>
                            </div>
                        {% endfor %}
                    </div>
                </div>

                <button type="submit" class="btn btn-dark w-100 fw-semibold py-2">Submit Guide Application</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
