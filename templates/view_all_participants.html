{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">Registered Participants</h2>
        <a href="{{ url_for('admin_route.dashboard') }}" class="btn btn-outline-secondary">Back to Dashboard</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-3">Name</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in participants %}
                    <tr>
                        <td class="ps-3 fw-bold">{{ p.first_name }} {{ p.last_name }}</td>
                        <td>{{ p.email }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="2" class="text-center py-4 text-muted">No participants currently registered.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
